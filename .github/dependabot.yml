version: 2

updates:
  # ── Backend (NestJS / Node) ──────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: "Asia/Kathmandu"
    open-pull-requests-limit: 1 # Only 1 branch/PR at a time for backend
    labels:
      - dependencies
      - backend
    groups:
      backend-dependencies:
        patterns:
          - "*" # Groups ALL backend updates into a single PR

  # ── Frontend (Next.js / React) ───────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: "Asia/Kathmandu"
    open-pull-requests-limit: 1 # Only 1 branch/PR at a time for frontend
    labels:
      - dependencies
      - frontend
    groups:
      frontend-dependencies:
        patterns:
          - "*" # Groups ALL frontend updates into a single PR

  # ── Root workspace ───────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day: monday
    open-pull-requests-limit: 1
    labels:
      - dependencies
    groups:
      root-dependencies:
        patterns:
          - "*"

  # ── GitHub Actions ───────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - ci
    groups:
      actions-updates:
        patterns:
          - "*"
