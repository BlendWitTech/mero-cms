name: Deploy — Staging

# Triggered when develop branch is updated.
# Render and Vercel auto-deploy via their GitHub integrations.
# This workflow validates the build and reports status.

on:
    push:
        branches: [develop]

jobs:
    validate:
        name: Validate Staging Build
        runs-on: ubuntu-latest
        environment: staging
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: backend/package-lock.json

            - name: Install backend dependencies
              run: npm ci
              working-directory: backend

            - name: Generate Prisma client
              run: npx prisma generate
              working-directory: backend
              env:
                  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

            - name: Build backend
              run: npm run build
              working-directory: backend
              env:
                  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

            - name: Verify dist/main.js exists
              run: test -f backend/dist/main.js

            - name: Install frontend dependencies
              run: npm ci
              working-directory: frontend

            - name: Build frontend
              run: npm run build
              working-directory: frontend
              env:
                  NEXT_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}

    # Render and Vercel will auto-deploy from the develop branch via their
    # GitHub integrations. No additional deploy step needed here.
    # To monitor: check Render and Vercel dashboards after this job passes.

    notify:
        name: Staging Deploy Notice
        runs-on: ubuntu-latest
        needs: validate
        if: success()
        steps:
            # Guard the secret print — without this, an unset STAGING_API_URL
            # silently prints "Backend (staging):" with nothing after it,
            # which looks like a successful deploy but really means the
            # secret was never wired up. Loud failure beats silent success.
            - name: Verify staging secrets are configured
              run: |
                  if [ -z "${{ secrets.STAGING_API_URL }}" ]; then
                      echo "::error::STAGING_API_URL secret is not set in repo settings."
                      echo "::error::Settings → Secrets and variables → Actions → New repository secret."
                      echo "::error::Set it to your Render staging backend URL, e.g. https://mero-cms-backend-staging.onrender.com"
                      exit 1
                  fi

            - name: Print staging URLs
              run: |
                  echo "Build validated. Render and Vercel are deploying..."
                  echo "Backend (staging):  ${{ secrets.STAGING_API_URL }}"
                  echo "Frontend (staging): Check Vercel dashboard for preview URL"
