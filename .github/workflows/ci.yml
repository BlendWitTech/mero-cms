name: CI — Build Validation

on:
    push:
        branches: ["**"]
    pull_request:
        branches: [develop, main]

jobs:
    backend:
        name: Backend Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: package-lock.json

            - name: Install backend dependencies
              run: npm ci
              working-directory: backend

            - name: Generate Prisma client
              run: npx prisma generate
              working-directory: backend
              env:
                  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

            - name: Build backend (NestJS)
              run: npm run build
              working-directory: backend
              env:
                  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

            - name: Verify dist/main.js exists
              run: test -f backend/dist/main.js

    frontend:
        name: Frontend Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install frontend dependencies
              run: npm ci
              working-directory: frontend

            - name: Build frontend (Next.js)
              run: npm run build
              working-directory: frontend
              env:
                  NEXT_PUBLIC_API_URL: "http://localhost:3001"

    demo:
        name: Demo App Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: package-lock.json

            - name: Install demo dependencies
              run: npm install
              working-directory: demo

            - name: Build demo (Next.js)
              run: npm run build
              working-directory: demo
              env:
                  NEXTAUTH_URL: "http://localhost:3003"
                  NEXTAUTH_SECRET: "ci-secret-placeholder-32-characters"
                  GOOGLE_CLIENT_ID: "placeholder"
                  GOOGLE_CLIENT_SECRET: "placeholder"
                  GITHUB_CLIENT_ID: "placeholder"
                  GITHUB_CLIENT_SECRET: "placeholder"
                  LINKEDIN_CLIENT_ID: "placeholder"
                  LINKEDIN_CLIENT_SECRET: "placeholder"
