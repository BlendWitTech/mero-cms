name: Bug Report
description: Report a bug. Available to approved contributors and license holders only.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees:
  - BlendWitTech

body:
  - type: markdown
    attributes:
      value: |
        **Before submitting:** Check existing issues to avoid duplicates.
        This form is for approved contributors and license holders. Unauthorized users should contact hello@blendwit.com.

  - type: dropdown
    id: access-type
    attributes:
      label: Access type
      description: How do you have access to Mero CMS?
      options:
        - Approved Contributor
        - License Holder — CMS Only
        - License Holder — CMS + Custom Theme
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened? What did you expect to happen?
      placeholder: "e.g. When I click Save on a blog post, the page returns a 500 error..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to Dashboard → Blogs
        2. Click New Post
        3. Fill in title and content
        4. Click Save
        5. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: "The post should be saved and I should be redirected to the post list."
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical — system unusable
        - High — major feature broken
        - Medium — feature works but behaves incorrectly
        - Low — minor cosmetic or edge case
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / branch
      description: Which branch or release are you on?
      placeholder: "develop / main / v1.2.0"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local (Docker / npm dev)
        - Railway (staging)
        - Railway (production)
        - Other hosting
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste backend logs, browser console errors, or attach screenshots.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have included steps to reproduce
          required: true
