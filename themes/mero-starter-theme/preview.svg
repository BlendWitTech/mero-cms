<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Nav bar -->
  <rect x="0" y="0" width="800" height="56" fill="#1e293b" opacity="0.9"/>
  <text x="40" y="35" font-family="system-ui,sans-serif" font-size="17" font-weight="700" fill="white">Mero CMS</text>
  <circle cx="28" cy="28" r="10" fill="#3b82f6"/>
  <text x="23" y="33" font-family="system-ui,sans-serif" font-size="13" font-weight="900" fill="white">M</text>
  <text x="520" y="35" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">Features</text>
  <text x="600" y="35" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">Pricing</text>
  <text x="662" y="35" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">Blog</text>
  <rect x="700" y="18" width="80" height="28" rx="5" fill="url(#btn)"/>
  <text x="740" y="37" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="white">Get Started</text>

  <!-- Hero -->
  <text x="400" y="135" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#6366f1" letter-spacing="3">THE MODULAR CMS</text>
  <text x="400" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="38" font-weight="800" fill="white">Build Smarter.</text>
  <text x="400" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="38" font-weight="800" fill="#6366f1">Ship Faster.</text>
  <text x="400" y="248" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" fill="#94a3b8">Enable only the modules your project needs.</text>
  <rect x="285" y="268" width="140" height="40" rx="6" fill="url(#btn)"/>
  <text x="355" y="293" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="white">Start Free →</text>
  <rect x="440" y="268" width="80" height="40" rx="6" fill="none" stroke="#475569" stroke-width="1.5"/>
  <text x="480" y="293" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8">Docs</text>

  <!-- Feature cards -->
  <rect x="50" y="330" width="210" height="85" rx="8" fill="#1e293b"/>
  <rect x="50" y="330" width="210" height="3" rx="2" fill="#3b82f6"/>
  <text x="70" y="362" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="white">⚡ Modular</text>
  <text x="70" y="382" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Enable only what you need</text>
  <text x="70" y="400" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">— nothing extra installed</text>

  <rect x="295" y="330" width="210" height="85" rx="8" fill="#1e293b"/>
  <rect x="295" y="330" width="210" height="3" rx="2" fill="#6366f1"/>
  <text x="315" y="362" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="white">🎨 Themeable</text>
  <text x="315" y="382" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Upload themes as ZIPs or</text>
  <text x="315" y="400" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">use built-in themes</text>

  <rect x="540" y="330" width="210" height="85" rx="8" fill="#1e293b"/>
  <rect x="540" y="330" width="210" height="3" rx="2" fill="#8b5cf6"/>
  <text x="560" y="362" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="white">🔐 RBAC</text>
  <text x="560" y="382" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Fine-grained roles and</text>
  <text x="560" y="400" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">permissions per user</text>
</svg>
