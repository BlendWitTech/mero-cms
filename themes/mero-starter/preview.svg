<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)" rx="8" />

  <!-- Subtle grid pattern -->
  <g opacity="0.08" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="80" y1="0" x2="80" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/>
    <line x1="320" y1="0" x2="320" y2="300"/>
  </g>

  <!-- Logo mark -->
  <rect x="170" y="60" width="60" height="60" rx="12" fill="rgba(255,255,255,0.2)" />
  <text x="200" y="101" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="800" fill="#fff">M</text>

  <!-- Site title -->
  <text x="200" y="160" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="800" fill="#fff">Mero CMS</text>

  <!-- Tagline -->
  <text x="200" y="188" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">The flexible CMS for modern websites</text>

  <!-- CTA button -->
  <rect x="145" y="210" width="110" height="36" rx="8" fill="rgba(255,255,255,0.2)" />
  <text x="200" y="232" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600" fill="#fff">Get Started Free</text>

  <!-- Feature dots -->
  <circle cx="130" cy="270" r="3" fill="rgba(255,255,255,0.5)" />
  <circle cx="150" cy="270" r="3" fill="rgba(255,255,255,0.5)" />
  <circle cx="170" cy="270" r="3" fill="rgba(255,255,255,0.8)" />
  <circle cx="190" cy="270" r="3" fill="rgba(255,255,255,0.5)" />
  <circle cx="210" cy="270" r="3" fill="rgba(255,255,255,0.5)" />
  <circle cx="230" cy="270" r="3" fill="rgba(255,255,255,0.5)" />
  <circle cx="250" cy="270" r="3" fill="rgba(255,255,255,0.5)" />
  <circle cx="270" cy="270" r="3" fill="rgba(255,255,255,0.5)" />
</svg>
