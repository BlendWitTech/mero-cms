  <text x="80" y="408" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8">Read more →</text>

  <rect x="295" y="315" width="215" height="105" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="295" y="315" width="215" height="4" rx="2" fill="#6366f1"/>
