<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4338ca;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)" />
  <rect width="400" height="300" fill="url(#shine)" />

  <!-- Decorative circles -->
  <circle cx="360" cy="40" r="80" fill="#ffffff" fill-opacity="0.04" />
  <circle cx="40" cy="260" r="100" fill="#ffffff" fill-opacity="0.04" />
  <circle cx="200" cy="150" r="140" fill="#ffffff" fill-opacity="0.03" />

  <!-- Decorative grid lines -->
  <line x1="0" y1="75" x2="400" y2="75" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" />
  <line x1="0" y1="150" x2="400" y2="150" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" />
  <line x1="0" y1="225" x2="400" y2="225" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" />
  <line x1="100" y1="0" x2="100" y2="300" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" />
  <line x1="200" y1="0" x2="200" y2="300" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" />
  <line x1="300" y1="0" x2="300" y2="300" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" />

  <!-- Nav bar mockup -->
  <rect x="40" y="30" width="320" height="32" rx="6" fill="#ffffff" fill-opacity="0.12" />
  <circle cx="62" cy="46" r="8" fill="#ffffff" fill-opacity="0.5" />
  <rect x="78" y="41" width="40" height="10" rx="3" fill="#ffffff" fill-opacity="0.5" />
  <rect x="210" y="41" width="28" height="8" rx="3" fill="#ffffff" fill-opacity="0.3" />
  <rect x="246" y="41" width="28" height="8" rx="3" fill="#ffffff" fill-opacity="0.3" />
  <rect x="282" y="38" width="60" height="16" rx="4" fill="#ffffff" fill-opacity="0.25" />

  <!-- Hero content block -->
  <rect x="100" y="90" width="200" height="16" rx="4" fill="#ffffff" fill-opacity="0.9" />
  <rect x="120" y="114" width="160" height="10" rx="3" fill="#ffffff" fill-opacity="0.5" />
  <rect x="130" y="130" width="140" height="8" rx="3" fill="#ffffff" fill-opacity="0.4" />

  <!-- CTA buttons -->
  <rect x="112" y="152" width="80" height="26" rx="6" fill="#ffffff" fill-opacity="0.95" />
  <rect x="200" y="152" width="80" height="26" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.7" stroke-width="1.5" />
  <rect x="124" y="160" width="56" height="10" rx="3" fill="#4f46e5" fill-opacity="0.9" />
  <rect x="214" y="160" width="52" height="10" rx="3" fill="#ffffff" fill-opacity="0.7" />

  <!-- Feature cards -->
  <rect x="40" y="200" width="90" height="60" rx="8" fill="#ffffff" fill-opacity="0.1" />
  <rect x="155" y="200" width="90" height="60" rx="8" fill="#ffffff" fill-opacity="0.1" />
  <rect x="270" y="200" width="90" height="60" rx="8" fill="#ffffff" fill-opacity="0.1" />

  <rect x="52" y="212" width="24" height="24" rx="4" fill="#ffffff" fill-opacity="0.2" />
  <rect x="52" y="242" width="60" height="8" rx="2" fill="#ffffff" fill-opacity="0.4" />

  <rect x="167" y="212" width="24" height="24" rx="4" fill="#ffffff" fill-opacity="0.2" />
  <rect x="167" y="242" width="60" height="8" rx="2" fill="#ffffff" fill-opacity="0.4" />

  <rect x="282" y="212" width="24" height="24" rx="4" fill="#ffffff" fill-opacity="0.2" />
  <rect x="282" y="242" width="60" height="8" rx="2" fill="#ffffff" fill-opacity="0.4" />

  <!-- Main title text -->
  <text x="200" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-0.5">Mero CMS</text>

  <!-- Subtitle -->
  <text x="200" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#ffffff" fill-opacity="0.6" text-anchor="middle" letter-spacing="1">cms-starter</text>
</svg>
